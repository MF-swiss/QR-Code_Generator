name: Build and Release Artifacts

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build package
        run: mvn -B -ntp clean package

      - name: Upload target artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qr-code-generator-target
          path: |
            target/*.jar
            target/*.png

      - name: Build Windows app-image
        shell: pwsh
        run: |
          if (Test-Path .\build-windows-app.bat) {
            .\build-windows-app.bat app-image
          }

      - name: Upload windows distribution
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: qr-code-generator-windows
          path: dist/**
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release (auto notes)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.jar
            artifacts/**/*.png
            artifacts/**/*.svg
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*
